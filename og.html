<!DOCTYPE html>
<html>
<head>
<style>
  body {
    margin: 0;
    width: 1200px;
    height: 630px;
    background: linear-gradient(135deg, #F8FAFC 0%, #E2E8F0 100%);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #0F172A;
    overflow: hidden;
    position: relative;
  }
  
  .accent-1 {
    position: absolute;
    top: -20%;
    left: -10%;
    width: 60%;
    height: 80%;
    background: radial-gradient(circle, rgba(108, 76, 241, 0.1) 0%, transparent 70%);
    border-radius: 50%;
  }
  
  .accent-2 {
    position: absolute;
    bottom: -30%;
    right: -10%;
    width: 70%;
    height: 80%;
    background: radial-gradient(circle, rgba(139, 92, 246, 0.08) 0%, transparent 70%);
    border-radius: 50%;
  }
  
  .grid {
    position: absolute;
    inset: 0;
    background-image: linear-gradient(to right, rgba(15,23,42,0.03) 1px, transparent 1px), linear-gradient(to bottom, rgba(15,23,42,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  .content {
    position: relative;
    z-index: 10;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 25px;
    background: rgba(255, 255, 255, 0.6);
    padding: 60px 100px;
    border-radius: 40px;
    border: 1px solid rgba(255, 255, 255, 0.8);
    box-shadow: 0 20px 40px rgba(0,0,0,0.05);
    backdrop-filter: blur(10px);
  }

  .avatar {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    border: 4px solid white;
    margin-bottom: 10px;
    background: white;
  }
  
  .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  h1 {
    font-size: 72px;
    margin: 0;
    font-weight: 800;
    letter-spacing: -2px;
    color: #0F172A;
  }

  h2 {
    font-size: 32px;
    margin: 0;
    color: #475569;
    font-weight: 500;
    letter-spacing: -0.5px;
  }

  .badges {
    display: flex;
    gap: 16px;
    margin-top: 15px;
  }

  .badge {
    background: #F1F5F9;
    border: 1px solid #E2E8F0;
    padding: 10px 24px;
    border-radius: 40px;
    font-size: 20px;
    color: #334155;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="accent-1"></div>
  <div class="accent-2"></div>
  
  <div class="content">
    <div class="avatar">
      <img src="file:///C:/Users/dv735/Desktop/Final/Cinematic Personal Portfolio Website/src/imports/images/IMG_0133.png" alt="DV" />
    </div>
    <h1>Digvijay Vaghela</h1>
    <h2>Full Stack Developer <span style="color: #6C4CF1; margin: 0 10px;">|</span> React Developer</h2>
    <div class="badges">
      <div class="badge">React</div>
      <div class="badge">Node.js</div>
      <div class="badge">TypeScript</div>
    </div>
  </div>
</body>
</html>
