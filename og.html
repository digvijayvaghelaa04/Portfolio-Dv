<!DOCTYPE html>
<html>
<head>
<style>
  body {
    margin: 0;
    width: 1200px;
    height: 630px;
    background: linear-gradient(135deg, #0F172A 0%, #050505 100%);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    overflow: hidden;
    position: relative;
  }
  
  .accent-1 {
    position: absolute;
    top: -20%;
    left: -10%;
    width: 60%;
    height: 80%;
    background: radial-gradient(circle, rgba(108, 76, 241, 0.25) 0%, transparent 70%);
    border-radius: 50%;
  }
  
  .accent-2 {
    position: absolute;
    bottom: -30%;
    right: -10%;
    width: 70%;
    height: 80%;
    background: radial-gradient(circle, rgba(139, 92, 246, 0.2) 0%, transparent 70%);
    border-radius: 50%;
  }
  
  .grid {
    position: absolute;
    inset: 0;
    background-image: linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  .content {
    position: relative;
    z-index: 10;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 30px;
  }

  .avatar {
    width: 140px;
    height: 140px;
    background: linear-gradient(135deg, #6C4CF1, #8B5CF6);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 60px;
    font-weight: 800;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    border: 4px solid rgba(255,255,255,0.15);
    letter-spacing: -2px;
  }

  h1 {
    font-size: 85px;
    margin: 0;
    font-weight: 800;
    letter-spacing: -2px;
    text-shadow: 0 4px 10px rgba(0,0,0,0.3);
  }

  h2 {
    font-size: 42px;
    margin: 0;
    color: #94A3B8;
    font-weight: 500;
    letter-spacing: -0.5px;
  }

  .badges {
    display: flex;
    gap: 20px;
    margin-top: 20px;
  }

  .badge {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.15);
    padding: 12px 28px;
    border-radius: 40px;
    font-size: 22px;
    color: #cbd5e1;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="accent-1"></div>
  <div class="accent-2"></div>
  
  <div class="content">
    <div class="avatar">DV</div>
    <h1>Digvijay Vaghela</h1>
    <h2>Full Stack Developer <span style="color: #6C4CF1">|</span> React Developer</h2>
    <div class="badges">
      <div class="badge">React</div>
      <div class="badge">Node.js</div>
      <div class="badge">TypeScript</div>
    </div>
  </div>
</body>
</html>
